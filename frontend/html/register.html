<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register - ExpenseAI</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="../css/auth.css">
</head>
<body>
  <div class="auth-container">
    <div class="brand-header">
      <i class="fa-solid fa-brain-circuit"></i>
      <h1>ExpenseAI</h1>
      <p>Create your smart wealth portal</p>
    </div>

    <div id="alertBox" class="alert" style="display: none;"></div>

    <form id="registerForm">
      <div class="form-group">
        <label for="name">Full Name</label>
        <div class="input-wrapper">
          <i class="fa-regular fa-user"></i>
          <input type="text" id="name" class="form-control" placeholder="John Doe" required>
        </div>
      </div>

      <div class="form-group">
        <label for="email">Email Address</label>
        <div class="input-wrapper">
          <i class="fa-regular fa-envelope"></i>
          <input type="email" id="email" class="form-control" placeholder="name@example.com" required>
        </div>
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <div class="input-wrapper">
          <i class="fa-solid fa-lock"></i>
          <input type="password" id="password" class="form-control" placeholder="•••••••• (Min 6 chars)" minlength="6" required>
        </div>
      </div>

      <button type="submit" class="auth-btn">Create Account</button>
    </form>

    <div class="auth-footer">
      <p>Already have an account? <a href="login.html" class="auth-link">Sign In</a></p>
    </div>
  </div>

  <script src="../js/api.js"></script>
  <script src="../js/auth.js"></script>
</body>
</html>
